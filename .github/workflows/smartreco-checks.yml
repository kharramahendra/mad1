name: SmartReco Checks
on: [push]
permissions:
  id-token: write
  contents: read
jobs:
  checks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install check dependencies
        run: pip install pinecone
      - name: Request GitHub OIDC token
        id: oidc
        run: |
          TOKEN=$(curl -sS \
            -H "Authorization: bearer $ACTIONS_ID_TOKEN_REQUEST_TOKEN" \
            "$ACTIONS_ID_TOKEN_REQUEST_URL&audience=https://career.krishnaik.in" \
            | jq -r '.value')
          echo "::add-mask::$TOKEN"
          echo "token=$TOKEN" >> "$GITHUB_OUTPUT"
      - name: Download checks
        run: curl -sSf -o checks.py "https://career.krishnaik.in/api/ci/checks.py?v=smartreco"
      - name: Run checks
        env:
          WEBHOOK_URL: https://career.krishnaik.in/api/ci/report
          SUBMISSION_TOKEN: ${{ secrets.SUBMISSION_TOKEN }}
          OIDC_TOKEN: ${{ steps.oidc.outputs.token }}
          PINECONE_API_KEY: ${{ secrets.PINECONE_API_KEY }}
          PINECONE_INDEX: ${{ secrets.PINECONE_INDEX }}
        run: python checks.py